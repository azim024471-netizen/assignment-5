<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- text font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <title> GitHub Issues Tracker</title>

    <!-- for icons -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

     <!-- tailwind and daisyUi -->
      <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        *{
            font-family: "Geist", sans-serif;
        }
    </style>
</head>
<body class="bg-[#F8FAFC]"> 
    <!-- nav bar -->
    <section class="px-20 py-6 flex justify-between shadow-sm bg-white" >
        
        <div class="logo flex gap-1.5   items-center ">
            <img class="w-9 h-9"  src="assets/github-logo.png" alt=""> 
            <h3 class="font-semibold text-2xl">GitHub Issues Tracker</h3>
        </div>
                
        <div class="flex gap-2">
            <label class="input">
  <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <g
      stroke-linejoin="round"
      stroke-linecap="round"
      stroke-width="2.5"
      fill="none"
      stroke="currentColor"
    >
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.3-4.3"></path>
    </g>
  </svg>
  <input id="search-input" type="search" required placeholder="Search issues..." />
</label>

<button id="search-btn" class="btn btn-primary font-semibold ">+ New Issue</button>
        </div>
         
    </section>

    <section class="all-btn w-11/16  mx-auto ">
        <div class="bg-white shadow-sm my-5 flex gap-3 ml-4 p-4"> 
            <button onclick="buttonClick('all-issue-btn')" id="all-issue-btn" class="issue-btn btn btn-active btn-primary ">All </button>
            <button onclick="buttonClick('open-btn')" id="open-btn" class="issue-btn btn font-medium">open</button> 
            <button onclick="buttonClick('closed-btn')" id="closed-btn" class="issue-btn btn font-medium">closed</button>
        </div>
    </section>
                              <!-- loading -->

              <section class="flex justify-center items-center py-10 ">

                <span id="spinner" class="loading loading-ring loading-xl hidden"></span>
      
               </section>                

                
    <!--  main section  -->
    <section class="w-11/16  mx-auto">
        <div class="description flex justify-between p-6 bg-white border-b border-gray-200"> 

            <div class="left flex gap-2.5">
                <div class="w-12 h-12 bg-[#ECE4FF] rounded-full flex items-center justify-center">
                  <img src="assets/Aperture.png" alt="">
              </div>
                <div class="">
                    <h5 class="font-semibold text-2xl">
                           <span id="all-issue">0</span> Issues
                    </h5>
                    <p class="text-[#64748B]">
                        Track and manage your project issues
                    </p>
                </div>
            </div>
             
            <div class="right flex gap-5 ">
              <div class="flex justify-center items-center gap-2">
                <div class="w-3 h-3 bg-green-700 rounded-full"> </div>
                <p class="text-[#1F2937]">Open</p>
            </div>
              <div class="flex justify-center items-center gap-2">
                <div class="w-3 h-3 bg-[#A855F7] rounded-full"> </div>
                <p class="text-[#1F2937]">Closed</p>
            </div>

            
            </div>

        </div>
                      
         <!--  main container -->
            <div id="card-container" class=" grid 
            grid-cols-4 gap-3 items-center justify-center p-6 ">


                 <!-- card will added her -->
       

           </div>
    </section>

    <!-- Open the modal using ID.showModal() method -->
<!-- <button class="btn" onclick="modal.showModal()">open modal</button> -->
<dialog id="modal" class="modal modal-bottom sm:modal-middle">

</dialog>



    <script src="script/main.js"></script>
</body>
</html>
